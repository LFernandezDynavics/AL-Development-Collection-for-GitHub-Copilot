id: al-development
name: AL Development Collection for GitHub Copilot
description: |
  ALDC Core v1.1 — Skills-based modularization with preserved orchestration for Business Central AL development.
  4 public agents + 3 internal subagents + 11 composable skills + 6 workflows + 9 auto-applied instructions.
  Spec-first, architecture-driven, TDD-orchestrated development with human-in-the-loop gates.
tags: [al, business-central, dynamics365, erp, microsoft, aldc, tdd, skills, orchestration, copilot]

items:
  # ─── Instructions (9 files — auto-applied coding standards) ───────────────
  - path: instructions/al-guidelines.instructions.md
    kind: instruction
  - path: instructions/al-code-style.instructions.md
    kind: instruction
  - path: instructions/al-naming-conventions.instructions.md
    kind: instruction
  - path: instructions/al-performance.instructions.md
    kind: instruction
  - path: instructions/al-error-handling.instructions.md
    kind: instruction
  - path: instructions/al-events.instructions.md
    kind: instruction
  - path: instructions/al-testing.instructions.md
    kind: instruction
  - path: instructions/copilot-instructions.md
    kind: instruction
    description: |
      Master integration document for GitHub Copilot. Routes to 4 public agents based on task:
      - Designing/architecture? → @al-architect
      - Implementing/coding/debugging? → @al-developer
      - TDD orchestrated feature (MEDIUM/HIGH)? → @al-conductor
      - Project estimation? → @al-presales
      Auto-loaded as .github/copilot-instructions.md per GitHub Copilot conventions.
  - path: instructions/index.md
    kind: instruction

  # ─── Workflows (6 retained — invoke with @workspace use [name]) ───────────
  - path: prompts/al-spec.create.prompt.md
    kind: prompt
  - path: prompts/al-build.prompt.md
    kind: prompt
  - path: prompts/al-pr-prepare.prompt.md
    kind: prompt
  - path: prompts/al-context.create.prompt.md
    kind: prompt
  - path: prompts/al-memory.create.prompt.md
    kind: prompt
  - path: prompts/al-initialize.prompt.md
    kind: prompt

  # ─── Skills (11 composable — loaded on demand by agents) ──────────────────
  # Required skills (7)
  - path: skills/skill-api.md
    kind: instruction
    description: API design, OData/REST, versioning, EntityName conventions, bound actions
  - path: skills/skill-copilot.md
    kind: instruction
    description: Copilot capability lifecycle, PromptDialog, AI Test Toolkit, responsible AI
  - path: skills/skill-debug.md
    kind: instruction
    description: Root cause analysis workflow, profiling, diagnostic patterns
  - path: skills/skill-performance.md
    kind: instruction
    description: SetLoadFields, CalcFields grouping, early filtering, temporary tables, triage
  - path: skills/skill-events.md
    kind: instruction
    description: Event subscriber/publisher patterns, IsHandled, integration events
  - path: skills/skill-permissions.md
    kind: instruction
    description: PermissionSet generation, READ/CALC permission sets, security models
  - path: skills/skill-testing.md
    kind: instruction
    description: Given/When/Then, Library Assert, IsInitialized, TDD cycle, AL-Go structure
  # Recommended skills (4)
  - path: skills/skill-migrate.md
    kind: instruction
    description: BC version migration, breaking changes, upgrade codeunits
  - path: skills/skill-pages.md
    kind: instruction
    description: Page types, UX patterns, controls, Page Designer integration
  - path: skills/skill-translate.md
    kind: instruction
    description: XLIFF, multi-language, localization, translation management
  - path: skills/skill-estimation.md
    kind: instruction
    description: Project estimation, PERT, SWOT analysis, effort scoping

  # ─── Public Agents (4 — user-invokable) ───────────────────────────────────
  - path: agents/al-architect.agent.md
    kind: agent
    usage: recommended
    description: |
      Solution Architect — YOUR ENTRY POINT FOR MEDIUM/HIGH complexity requirements.
      Designs solutions, information flows, Mermaid diagrams, technical decisions.
      Produces: {req_name}.architecture.md in .github/plans/{req_name}/

      Loads skills on demand: skill-api, skill-copilot, skill-performance, skill-events

      Flow: @al-architect → al-spec.create → @al-conductor

      Tool Boundaries:
      - CAN: Design solutions, create architecture docs, decompose requirements
      - CANNOT: Execute builds, deploy code (delegates to @al-developer or @al-conductor)

  - path: agents/al-developer.agent.md
    kind: agent
    usage: recommended
    description: |
      Implementation Specialist — Direct implementation for LOW complexity or quick adjustments.
      Implements features, fixes bugs, debugs, refactors. Full AL MCP tool access.

      Loads skills on demand: skill-debug, skill-api, skill-copilot, skill-events,
      skill-permissions, skill-pages, skill-migrate, skill-translate

      For LOW complexity: al-spec.create → @al-developer
      For debugging/quick fixes: @al-developer directly

      Tool Boundaries:
      - CAN: Create/edit files, build, publish, test, refactor, fix bugs
      - CANNOT: Design architectures, orchestrate multi-phase TDD (delegates to @al-conductor)

  - path: agents/al-conductor.agent.md
    kind: agent
    usage: recommended
    description: |
      TDD Orchestrator — Coordinates multi-phase implementation for MEDIUM/HIGH complexity.
      Delegates to 3 internal subagents: planning → implement → review.
      Enforces RED→GREEN→REFACTOR TDD cycle with HITL gates per phase.

      Requires: {req_name}.spec.md in .github/plans/{req_name}/ (from al-spec.create)
      Produces: {req_name}-plan.md and {req_name}-phase-N-complete.md

      Subagents invoked automatically (not user-invokable):
      - al-planning-subagent: context research
      - al-implement-subagent: TDD implementation (tests FIRST)
      - al-review-subagent: code review against spec + architecture

  - path: agents/al-presales.agent.md
    kind: agent
    usage: optional
    description: |
      Pre-Sales & Estimation Specialist — effort estimation, project scoping, risk assessment.
      Lives outside the development cycle. Loads skill-estimation.

      Produces: effort estimates, project plans, risk assessments

  # ─── Internal Subagents (3 — conductor-only, not user-invokable) ──────────
  - path: agents/al-planning-subagent.agent.md
    kind: agent
    usage: optional
    description: |
      AL-aware research and context gathering. Called by al-conductor.
      Analyzes codebase, dependencies, AL objects, event architecture, AL-Go structure.
      Returns structured findings to conductor for plan creation.
      NOT for direct use — invoked automatically by @al-conductor.

  - path: agents/al-implement-subagent.agent.md
    kind: agent
    usage: optional
    description: |
      TDD-only implementation subagent. Called by al-conductor per phase.
      Step 0: Verify test infrastructure (Library Assert, Any, ID ranges).
      RED: Write failing tests. GREEN: Minimal code. REFACTOR: AL patterns.
      Loads domain skills (skill-api, skill-permissions, etc.) as needed.
      NOT for direct use — invoked automatically by @al-conductor.

  - path: agents/al-review-subagent.agent.md
    kind: agent
    usage: optional
    description: |
      Code review subagent. Called by al-conductor after each implementation phase.
      Validates against spec + architecture + AL best practices.
      Returns: APPROVED / NEEDS_REVISION / FAILED with CRITICAL/MAJOR/MINOR issues.
      Checks skills compliance (api patterns, performance patterns, test patterns).
      NOT for direct use — invoked automatically by @al-conductor.

display:
  ordering: manual
  show_badge: true
